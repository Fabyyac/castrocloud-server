<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CastroCloud</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOPO -->
  <header class="topo">
    <div class="logo-topo">
      <img src="logo.png" alt="CastroCloud">
    </div>

    <button class="btn-sair" onclick="logout()">Sair</button>
  </header>

  <!-- CONTEÚDO -->
  <main class="container index">

    <h3 id="bemvindo"></h3>

    <div class="upload-box">
      <input type="file" id="fileInput">
      <button onclick="uploadFile()">Enviar Arquivo</button>
    </div>

    <div id="resultado"></div>

  </main>

  <script>
    // 🔐 PROTEÇÃO DE LOGIN
    if (localStorage.getItem("logado") !== "true") {
      window.location.href = "login.html";
    }

    // 👤 MOSTRAR NOME
    const nome = localStorage.getItem("usuario");
    document.getElementById("bemvindo").innerText = "Bem-vinda, " + nome;

    // 🚪 LOGOUT
    function logout() {
      localStorage.removeItem("logado");
      localStorage.removeItem("usuario");
      window.location.href = "login.html";
    }

    // ☁️ UPLOAD DE ARQUIVO
    async function uploadFile() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];

      if (!file) {
        alert("Escolha um arquivo!");
        return;
      }

      const reader = new FileReader();

      reader.onloadend = async () => {
        const base64 = reader.result;

        try {
          const response = await fetch('https://castrocloud-api.onrender.com/upload', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ file: base64 })
          });

          const data = await response.json();

          // ✅ CORREÇÃO IMPORTANTE AQUI
          if (data.url) {
            document.getElementById('resultado').innerHTML = `
              <p>Arquivo enviado com sucesso!</p>
              <a href="${data.url}" target="_blank">Abrir arquivo</a>
            `;
          } else {
            alert("Erro no upload!");
            console.error(data);
          }

        } catch (error) {
          alert("Erro ao enviar arquivo!");
          console.error(error);
        }
      };

      reader.readAsDataURL(file);
    }
  </script>

</body>
</html>
