<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CastroCloud - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="logo-container">
    <img src="logo.png" alt="CastroCloud Logo">
  </div>

  <div class="container">
    <h2>Entrar</h2>

    <input type="text" id="nome" placeholder="Nome completo">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>
  </div>

  <script>
    const usuarios = [
      { nome: "Fabricia Castro", senha: "123" },
      { nome: "Serena Castro", senha: "456" }
    ];

    function login() {
      const nome = document.getElementById('nome').value.trim();
      const senha = document.getElementById('senha').value;

      const usuarioValido = usuarios.find(user =>
        user.nome.toLowerCase() === nome.toLowerCase() &&
        user.senha === senha
      );

      if (usuarioValido) {
        localStorage.setItem("logado", "true");
        localStorage.setItem("usuario", usuarioValido.nome);
        window.location.href = "index.html";
      } else {
        alert("Nome ou senha inválidos!");
      }
    }
  </script>

</body>
</html>
